<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Police 상황실 — ops.police.hondi.net</title>
<link rel="icon" href="data:,">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0f1e;color:#e2e8f0;
  font-family:'Courier New',monospace;font-size:13px;overflow:hidden}

:root{
  --blue:#3b82f6;--blue-dk:#1e3a8a;--blue-lt:#93c5fd;
  --red:#ef4444;--orange:#f97316;--green:#22c55e;--yellow:#eab308;
  --bg:#0a0f1e;--surface:#111827;--surface2:#1e2a3a;--border:#1e3a5f;
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#475569;
}

/* ══ 전체 레이아웃 ══ */
#ops-app{display:grid;grid-template-rows:44px 1fr;height:100vh}

/* ══ 상단 헤더 ══ */
.ops-header{
  background:#0d1b2e;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:16px;
  position:relative;z-index:100;
}
.ops-logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;
  color:var(--blue-lt);letter-spacing:1px}
.ops-logo span{font-size:18px}
.ops-time{font-size:13px;color:var(--txt2);font-family:'Courier New',monospace}
.ops-status{margin-left:auto;display:flex;align-items:center;gap:16px}
.status-item{display:flex;align-items:center;gap:6px;font-size:12px}
.status-dot{width:6px;height:6px;border-radius:50%}
.dot-green{background:var(--green);box-shadow:0 0 6px var(--green);animation:dotPulse 2s infinite}
.dot-red{background:var(--red);box-shadow:0 0 6px var(--red)}
.dot-yellow{background:var(--yellow)}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ══ 메인 영역 ══ */
.ops-main{display:grid;grid-template-columns:320px 1fr 320px;height:100%;overflow:hidden}

/* ══ 좌측 패널 — 사건 목록 ══ */
.panel-left{background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden}
.panel-title{padding:10px 14px;background:#0d1b2e;border-bottom:1px solid var(--border);
  font-size:11px;font-weight:700;color:var(--blue-lt);letter-spacing:1.5px;text-transform:uppercase;
  display:flex;align-items:center;justify-content:space-between}
.panel-badge{background:var(--red);color:#fff;border-radius:10px;
  padding:2px 7px;font-size:10px;font-weight:700;font-family:sans-serif}
.incident-list{flex:1;overflow-y:auto;padding:8px}
.incident-list::-webkit-scrollbar{width:4px}
.incident-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* 사건 아이템 */
.inc-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.inc-item:hover{border-color:var(--blue)}
.inc-item.selected{border-color:var(--blue);background:#0f1f38}
.inc-item.critical{border-left:3px solid var(--red)}
.inc-item.high{border-left:3px solid var(--orange)}
.inc-item.medium{border-left:3px solid var(--yellow)}
.inc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.inc-id{font-size:11px;font-weight:700;color:var(--blue-lt);font-family:'Courier New',monospace}
.inc-severity{font-size:10px;font-weight:700;border-radius:4px;padding:2px 6px}
.sev-critical{background:rgba(239,68,68,.2);color:#fca5a5}
.sev-high{background:rgba(249,115,22,.2);color:#fdba74}
.sev-medium{background:rgba(234,179,8,.2);color:#fde047}
.inc-type{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:3px}
.inc-addr{font-size:11px;color:var(--txt2);margin-bottom:4px}
.inc-time{font-size:10px;color:var(--txt3)}
.inc-status{display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px}

/* 버튼들 */
.btn-approve{background:var(--green);color:#fff;border:none;border-radius:5px;
  padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-approve:hover{opacity:.8}
.btn-override{background:var(--red);color:#fff;border:none;border-radius:5px;
  padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer}
.btn-sim{background:var(--blue);color:#fff;border:none;border-radius:5px;
  padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer}

/* ══ 중앙 — 지도 시뮬레이터 ══ */
.panel-map{position:relative;background:#0d1b2e;overflow:hidden}
.map-canvas{width:100%;height:100%;display:block}

/* 지도 오버레이 */
.map-overlay{position:absolute;top:10px;left:10px;
  background:rgba(13,27,46,.85);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;font-size:11px;color:var(--txt2)}
.map-overlay strong{color:var(--blue-lt);display:block;margin-bottom:4px;font-size:10px;letter-spacing:1px}

.map-legend{position:absolute;bottom:10px;left:10px;
  background:rgba(13,27,46,.85);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;font-size:11px}
.legend-item{display:flex;align-items:center;gap:6px;margin-bottom:3px;color:var(--txt2)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* AV 명령 토스트 */
.av-toast{position:absolute;top:10px;right:10px;
  background:rgba(13,27,46,.92);border:1px solid var(--blue);border-radius:8px;
  padding:10px 14px;font-size:12px;color:var(--blue-lt);max-width:220px;
  display:none;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

/* ══ 우측 패널 ══ */
.panel-right{background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden}

/* 탭 */
.right-tabs{display:flex;border-bottom:1px solid var(--border);background:#0d1b2e}
.right-tab{flex:1;padding:8px 0;font-size:11px;font-weight:700;color:var(--txt3);
  background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;letter-spacing:.5px;text-align:center}
.right-tab.active{color:var(--blue-lt);border-bottom-color:var(--blue)}
.right-content{flex:1;overflow-y:auto;padding:10px}
.right-content::-webkit-scrollbar{width:4px}
.right-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* 요원 카드 */
.agent-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:10px;margin-bottom:8px}
.agent-card-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.agent-avatar-ops{width:32px;height:32px;border-radius:50%;background:var(--blue-dk);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  color:var(--blue-lt);flex-shrink:0;font-family:sans-serif}
.agent-name-ops{font-size:13px;font-weight:700;color:var(--txt)}
.agent-rank-ops{font-size:10px;color:var(--txt2)}
.agent-status-badge{margin-left:auto;font-size:10px;font-weight:700;border-radius:4px;padding:2px 6px}
.status-idle{background:rgba(34,197,94,.15);color:#86efac}
.status-dispatched{background:rgba(239,68,68,.15);color:#fca5a5}
.status-patrol{background:rgba(59,130,246,.15);color:#93c5fd}
.agent-spec{font-size:11px;color:var(--txt2);margin-bottom:4px}
.agent-loc{font-size:10px;color:var(--txt3);font-family:'Courier New',monospace}

/* 차량 카드 */
.vehicle-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:10px;margin-bottom:8px}
.vehicle-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.vehicle-icon{font-size:20px}
.vehicle-id-ops{font-size:12px;font-weight:700;color:var(--blue-lt);font-family:'Courier New',monospace}
.vehicle-type-ops{font-size:11px;color:var(--txt2)}
.av-badge{background:rgba(168,85,247,.2);color:#d8b4fe;border-radius:4px;
  padding:2px 6px;font-size:10px;font-weight:700;margin-left:auto}

/* 출동 명령 패널 */
.order-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:10px;margin-bottom:8px;border-left:3px solid var(--blue)}
.order-header{display:flex;justify-content:space-between;margin-bottom:6px}
.order-id{font-size:11px;font-weight:700;color:var(--blue-lt);font-family:'Courier New',monospace}
.order-status{font-size:10px;font-weight:700;border-radius:4px;padding:2px 6px}
.ostatus-issued{background:rgba(234,179,8,.2);color:#fde047}
.ostatus-enroute{background:rgba(59,130,246,.2);color:#93c5fd}
.ostatus-arrived{background:rgba(34,197,94,.2);color:#86efac}
.order-agent{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:3px}
.order-action{font-size:11px;color:var(--txt2);line-height:1.5;margin-bottom:4px}
.order-eta{font-size:12px;color:var(--green);font-weight:700}

/* 로그 */
.log-entry{font-size:11px;color:var(--txt2);padding:4px 0;
  border-bottom:1px solid rgba(255,255,255,.04);line-height:1.5}
.log-entry .log-time{color:var(--txt3);font-family:'Courier New',monospace;margin-right:6px}
.log-entry .log-critical{color:var(--red)}
.log-entry .log-high{color:var(--orange)}
.log-entry .log-info{color:var(--blue-lt)}
.log-entry .log-av{color:#d8b4fe}

/* 심박 라인 애니메이션 */
.heartbeat-line{height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);
  animation:heartbeat 2s linear infinite;margin:6px 0}
@keyframes heartbeat{0%{opacity:0;transform:scaleX(.3)}50%{opacity:1;transform:scaleX(1)}100%{opacity:0}}

/* 스크롤바 */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* 시뮬 버튼 */
.sim-controls{padding:10px 14px;background:#0d1b2e;border-top:1px solid var(--border);
  display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.sim-btn{flex:1;min-width:80px;padding:6px 8px;border:none;border-radius:6px;
  font-size:11px;font-weight:700;cursor:pointer;transition:opacity .15s}
.sim-btn:hover{opacity:.8}
.sim-btn-red{background:rgba(239,68,68,.8);color:#fff}
.sim-btn-orange{background:rgba(249,115,22,.7);color:#fff}
.sim-btn-blue{background:rgba(59,130,246,.7);color:#fff}
.sim-btn-purple{background:rgba(168,85,247,.7);color:#fff}
</style>
</head>
<body>
<div id="ops-app">
  <!-- 헤더 -->
  <header class="ops-header">
    <div class="ops-logo"><span>🚔</span> K-POLICE OPS CENTER</div>
    <div class="ops-time" id="ops-clock">--:--:--</div>
    <div class="ops-status">
      <div class="status-item"><div class="status-dot dot-green"></div><span>시스템 정상</span></div>
      <div class="status-item"><div class="status-dot dot-green"></div><span id="active-count">활성 사건 0</span></div>
      <div class="status-item"><div class="status-dot dot-green"></div><span id="agent-count">요원 0명</span></div>
      <div class="status-item"><div class="status-dot" id="bc-dot" style="background:var(--txt3)"></div><span>BC 채널</span></div>
    </div>
  </header>

  <!-- 메인 -->
  <div class="ops-main">

    <!-- 좌측: 사건 목록 -->
    <div class="panel-left">
      <div class="panel-title">
        <span>ACTIVE INCIDENTS</span>
        <span class="panel-badge" id="incident-count">0</span>
      </div>
      <div class="incident-list" id="incident-list">
        <div style="color:var(--txt3);font-size:12px;text-align:center;padding:20px">
          대기 중…<br>사건 신고 시 자동 표시됩니다.
        </div>
      </div>
      <!-- 시뮬레이션 버튼 -->
      <div class="sim-controls">
        <button class="sim-btn sim-btn-red" onclick="simIncident('강도','CRITICAL')">🔴 강도 시뮬</button>
        <button class="sim-btn sim-btn-orange" onclick="simIncident('가정폭력','HIGH')">🟠 폭력 시뮬</button>
        <button class="sim-btn sim-btn-blue" onclick="simIncident('사이버범죄','HIGH')">🔵 사이버 시뮬</button>
        <button class="sim-btn sim-btn-purple" onclick="simAVCommand()">🤖 AV 시뮬</button>
      </div>
    </div>

    <!-- 중앙: 지도 -->
    <div class="panel-map">
      <canvas id="map-canvas" class="map-canvas"></canvas>

      <div class="map-overlay">
        <strong>MAP SIM — JEJU ISLAND</strong>
        <div>● 사건  ▲ 요원  ■ 차량  ★ 자율주행</div>
      </div>

      <div class="map-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>CRITICAL 사건</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>HIGH 사건</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>요원 (대기)</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>요원 (출동중)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#d8b4fe"></div>자율주행 차량</div>
      </div>

      <div class="av-toast" id="av-toast">
        <div style="font-size:10px;color:var(--txt3);margin-bottom:4px">🤖 자율주행 명령 전송</div>
        <div id="av-toast-text"></div>
      </div>
    </div>

    <!-- 우측: 자원·명령·로그 -->
    <div class="panel-right">
      <div class="right-tabs">
        <button class="right-tab active" id="rtab-orders" onclick="setRightTab('orders')">출동</button>
        <button class="right-tab" id="rtab-agents" onclick="setRightTab('agents')">요원</button>
        <button class="right-tab" id="rtab-vehicles" onclick="setRightTab('vehicles')">차량</button>
        <button class="right-tab" id="rtab-log" onclick="setRightTab('log')">로그</button>
      </div>
      <div class="right-content" id="right-content">
        <div style="color:var(--txt3);font-size:12px;text-align:center;padding:20px">
          출동 명령 대기 중…
        </div>
      </div>
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script type="module" src="https://hondi.net/auth/subsystem-auth.js"></script>
<script src="js/risk-engine.js"></script>
<script src="js/dispatch.js"></script>
<script>
// ── 상태 ──────────────────────────────────────────────────
let _incidents    = [];
let _agents       = [];
let _vehicles     = [];
let _orders       = [];
let _logs         = [];
let _selectedInc  = null;
let _rightTab     = 'orders';
let _animFrame    = null;
let _mapEntities  = []; // 지도에 표시할 엔티티들

// ── 시계 ──────────────────────────────────────────────────
setInterval(() => {
  document.getElementById('ops-clock').textContent =
    new Date().toLocaleTimeString('ko-KR', {hour12:false});
}, 1000);

// ── BroadcastChannel 수신 ─────────────────────────────────
function initBroadcastChannel() {
  try {
    const bc = new BroadcastChannel(KPOLICE_CONFIG.opsChannel);
    bc.onmessage = (e) => {
      if (e.data.type === 'DISPATCH_ORDER') {
        receiveDispatch(e.data.payload);
        document.getElementById('bc-dot').style.background = 'var(--green)';
        document.getElementById('bc-dot').style.boxShadow = '0 0 6px var(--green)';
        setTimeout(() => {
          document.getElementById('bc-dot').style.background = 'var(--txt3)';
          document.getElementById('bc-dot').style.boxShadow = 'none';
        }, 2000);
      }
    };
    addLog('INFO', 'BroadcastChannel 연결 완료');
  } catch(e) {
    addLog('INFO', 'BroadcastChannel 미지원 — 시뮬레이션 모드');
  }
}

// ── AV WebSocket 이벤트 수신 ──────────────────────────────
window.addEventListener('kpolice_av_command', (e) => {
  const d = e.detail;
  showAVToast(`${d.vehicleId} → ${d.destination.address}`);
  addLog('AV', `자율주행 명령: ${d.vehicleId} → ${d.destination.address} [${d.mission}]`);
  // 차량 위치 업데이트 (애니메이션)
  const v = _mapEntities.find(x => x.id === d.vehicleId);
  if (v) { v.targetLat = d.destination.lat; v.targetLng = d.destination.lng; v.moving = true; }
});

// ── 사건 수신 & 렌더링 ────────────────────────────────────
function receiveDispatch(payload) {
  // 중복 방지
  if (_incidents.find(i => i.incidentId === payload.incidentId)) return;

  _incidents.unshift(payload);
  _orders.push(...(payload.dispatchOrders || []));

  // 지도 엔티티 추가
  _mapEntities.push({
    type:     'incident',
    id:       payload.incidentId,
    lat:      payload.lat || 33.4950,
    lng:      payload.lng || 33.5280,
    severity: payload.riskLevel,
    label:    payload.summary?.split(' — ')[0] || '사건',
    blink:    true,
  });

  addLog(payload.riskLevel,
    `[${payload.incidentId}] ${payload.summary} — 자동출동: ${payload.autoDispatch ? 'YES' : 'PENDING'}`);

  renderIncidentList();
  updateCounts();
  renderRightContent();
}

// ── 로그 추가 ─────────────────────────────────────────────
function addLog(level, msg) {
  _logs.unshift({
    time:  new Date().toLocaleTimeString('ko-KR', {hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),
    level, msg,
  });
  if (_logs.length > 200) _logs.pop();
  if (_rightTab === 'log') renderRightContent();
}

// ── 카운트 업데이트 ───────────────────────────────────────
function updateCounts() {
  document.getElementById('incident-count').textContent = _incidents.length;
  document.getElementById('active-count').textContent   = `활성 사건 ${_incidents.length}`;
  document.getElementById('agent-count').textContent    = `요원 ${_agents.length}명`;
}

// ── 사건 목록 렌더링 ─────────────────────────────────────
function renderIncidentList() {
  const el = document.getElementById('incident-list');
  if (_incidents.length === 0) {
    el.innerHTML = '<div style="color:var(--txt3);font-size:12px;text-align:center;padding:20px">사건 없음</div>';
    return;
  }
  el.innerHTML = _incidents.map(inc => {
    const sevClass = inc.riskLevel?.toLowerCase() || 'medium';
    const sevLabel = { CRITICAL:'CRIT', HIGH:'HIGH', MEDIUM:'MED', LOW:'LOW' }[inc.riskLevel] || inc.riskLevel;
    const isAuto   = inc.autoDispatch;
    const isSelected = _selectedInc?.incidentId === inc.incidentId;
    return `
<div class="inc-item ${sevClass} ${isSelected?'selected':''}" onclick="selectIncident('${inc.incidentId}')">
  <div class="inc-header">
    <span class="inc-id">${inc.incidentId}</span>
    <span class="inc-severity sev-${sevClass}">${sevLabel}</span>
  </div>
  <div class="inc-type">${inc.summary?.split(' — ')[0] || '사건'}</div>
  <div class="inc-addr">${inc.summary?.split(' — ')[1] || '위치 확인 중'}</div>
  <div class="inc-time">${new Date().toLocaleTimeString('ko-KR')}</div>
  <div class="inc-status" style="margin-top:6px;gap:4px">
    ${isAuto
      ? '<span style="color:var(--green);font-size:10px;font-weight:700">✓ 자동 출동</span>'
      : `<button class="btn-approve" onclick="approveDispatch('${inc.incidentId}',event)">✓ 승인</button>
         <button class="btn-override" onclick="overrideDispatch('${inc.incidentId}',event)">✗ 취소</button>`
    }
  </div>
</div>`;
  }).join('');
}

// ── 사건 선택 ─────────────────────────────────────────────
function selectIncident(id) {
  _selectedInc = _incidents.find(i => i.incidentId === id);
  renderIncidentList();
  setRightTab('orders');
}

// ── 출동 승인/취소 ────────────────────────────────────────
function approveDispatch(id, e) {
  e.stopPropagation();
  const inc = _incidents.find(i => i.incidentId === id);
  if (inc) { inc.autoDispatch = true; inc.approved = true; }
  addLog('INFO', `[${id}] 출동 승인됨`);
  renderIncidentList();
  renderRightContent();
}

function overrideDispatch(id, e) {
  e.stopPropagation();
  _incidents = _incidents.filter(i => i.incidentId !== id);
  addLog('INFO', `[${id}] 출동 취소 (사람 오버라이드)`);
  renderIncidentList();
  updateCounts();
}

// ── 우측 탭 렌더링 ────────────────────────────────────────
function setRightTab(tab) {
  _rightTab = tab;
  ['orders','agents','vehicles','log'].forEach(t => {
    document.getElementById(`rtab-${t}`)?.classList.toggle('active', t === tab);
  });
  renderRightContent();
}

function renderRightContent() {
  const el = document.getElementById('right-content');

  if (_rightTab === 'orders') {
    const orders = _selectedInc ? (_selectedInc.dispatchOrders || []) : _orders;
    if (orders.length === 0) {
      el.innerHTML = '<div style="color:var(--txt3);font-size:12px;text-align:center;padding:20px">출동 명령 없음</div>';
      return;
    }
    el.innerHTML = `
      <div style="font-size:10px;color:var(--txt3);margin-bottom:8px;letter-spacing:.5px">
        ${_selectedInc ? `[${_selectedInc.incidentId}] ` : ''}출동 명령 ${orders.length}건
      </div>
      ${orders.map(o => `
      <div class="order-card">
        <div class="order-header">
          <span class="order-id">${o.orderId}</span>
          <span class="order-status ostatus-${(o.status||'issued').toLowerCase()}">${o.status || 'ISSUED'}</span>
        </div>
        <div class="order-agent">👮 ${o.agentName} ${o.rank || ''} — ${o.role}</div>
        <div class="order-action">${o.action}</div>
        <div class="order-eta">⏱ ETA ${o.eta}분 ${o.vehicle ? `| 🚗 ${o.vehicle}` : ''}</div>
        <div style="display:flex;gap:6px;margin-top:6px">
          <button class="btn-sim" onclick="updateOrderStatus('${o.orderId}','EN_ROUTE')" style="flex:1;font-size:10px">출동중</button>
          <button class="btn-approve" onclick="updateOrderStatus('${o.orderId}','ARRIVED')" style="font-size:10px">도착</button>
        </div>
      </div>`).join('')}
      ${_selectedInc?.vehicleOrders?.length ? `
      <div style="font-size:10px;color:var(--txt3);margin:8px 0 6px;letter-spacing:.5px">차량 명령</div>
      ${_selectedInc.vehicleOrders.map(v => `
      <div class="vehicle-card">
        <div class="vehicle-header">
          <div class="vehicle-icon">${v.autonomous ? '🤖' : '🚗'}</div>
          <div><div class="vehicle-id-ops">${v.vehicleId}</div><div class="vehicle-type-ops">${v.type}</div></div>
          ${v.autonomous ? '<span class="av-badge">AUTONOMOUS</span>' : ''}
        </div>
        <div style="font-size:11px;color:var(--txt2)">${v.mission}</div>
        <div style="font-size:10px;color:var(--txt3);margin-top:3px">→ ${v.destination?.address || '목적지 설정됨'}</div>
      </div>`).join('')}` : ''}
    `;
    return;
  }

  if (_rightTab === 'agents') {
    if (_agents.length === 0) { el.innerHTML = '<div style="color:var(--txt3);font-size:12px;text-align:center;padding:20px">요원 데이터 로딩 중…</div>'; return; }
    el.innerHTML = _agents.map(a => {
      const stClass = a.status==='대기' ? 'status-idle' : a.status==='출동중' ? 'status-dispatched' : 'status-patrol';
      return `
      <div class="agent-card">
        <div class="agent-card-header">
          <div class="agent-avatar-ops">${a.rank.charAt(0)}</div>
          <div>
            <div class="agent-name-ops">${a.name}</div>
            <div class="agent-rank-ops">${a.rank} · ${a.unit || ''}</div>
          </div>
          <span class="agent-status-badge ${stClass}">${a.status}</span>
        </div>
        <div class="agent-spec">전문: ${a.specialty.join(', ')}</div>
        <div class="agent-loc">📍 ${a.lat?.toFixed(4)}, ${a.lng?.toFixed(4)}</div>
      </div>`;
    }).join('');
    return;
  }

  if (_rightTab === 'vehicles') {
    if (_vehicles.length === 0) { el.innerHTML = '<div style="color:var(--txt3);font-size:12px;text-align:center;padding:20px">차량 데이터 로딩 중…</div>'; return; }
    el.innerHTML = _vehicles.map(v => `
      <div class="vehicle-card">
        <div class="vehicle-header">
          <div class="vehicle-icon">${v.autonomous?'🤖':v.type.includes('드론')?'🚁':'🚗'}</div>
          <div>
            <div class="vehicle-id-ops">${v.id}</div>
            <div class="vehicle-type-ops">${v.type} · ${v.status}</div>
          </div>
          ${v.autonomous ? '<span class="av-badge">AV</span>' : ''}
        </div>
        <div style="font-size:10px;color:var(--txt3);font-family:Courier New">📍 ${v.lat?.toFixed(4)}, ${v.lng?.toFixed(4)}</div>
        ${v.autonomous && v.wsEndpoint ? `<div style="font-size:10px;color:#d8b4fe;margin-top:3px">WS: ${v.wsEndpoint}</div>` : ''}
      </div>`).join('');
    return;
  }

  if (_rightTab === 'log') {
    el.innerHTML = `
      <div style="font-size:10px;color:var(--txt3);margin-bottom:6px;letter-spacing:.5px">SYSTEM LOG — ${_logs.length} ENTRIES</div>
      <div class="heartbeat-line"></div>
      ${_logs.map(l => `
      <div class="log-entry">
        <span class="log-time">${l.time}</span>
        <span class="log-${l.level?.toLowerCase() || 'info'}">[${l.level}]</span>
        ${escHtml(l.msg)}
      </div>`).join('')}`;
    return;
  }
}

function updateOrderStatus(orderId, status) {
  const o = _orders.find(x => x.orderId === orderId);
  if (o) o.status = status;
  if (_selectedInc) {
    const so = (_selectedInc.dispatchOrders||[]).find(x => x.orderId === orderId);
    if (so) so.status = status;
  }
  addLog('INFO', `[${orderId}] 상태 변경 → ${status}`);
  renderRightContent();
}

// ── AV 토스트 ─────────────────────────────────────────────
function showAVToast(text) {
  const t = document.getElementById('av-toast');
  document.getElementById('av-toast-text').textContent = text;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 4000);
}

// ── 지도 캔버스 렌더링 ────────────────────────────────────
const MAP = {
  // 제주도 개략 범위
  latMin: 33.20, latMax: 33.60,
  lngMin: 126.10, lngMax: 126.95,
};

function geoToCanvas(lat, lng, w, h) {
  const x = ((lng - MAP.lngMin) / (MAP.lngMax - MAP.lngMin)) * w;
  const y = h - ((lat - MAP.latMin) / (MAP.latMax - MAP.latMin)) * h;
  return [x, y];
}

function drawMap() {
  const canvas = document.getElementById('map-canvas');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width  = canvas.offsetWidth;
  const H = canvas.height = canvas.offsetHeight;

  // 배경
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0, 0, W, H);

  // 격자
  ctx.strokeStyle = 'rgba(30,58,138,.3)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 10; i++) {
    ctx.beginPath(); ctx.moveTo(W*i/10, 0); ctx.lineTo(W*i/10, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, H*i/10); ctx.lineTo(W, H*i/10); ctx.stroke();
  }

  // 제주도 윤곽 (단순화)
  const jeju = [
    [33.55,126.15],[33.56,126.35],[33.52,126.55],[33.48,126.70],
    [33.32,126.92],[33.22,126.78],[33.20,126.55],[33.25,126.35],
    [33.35,126.17],[33.45,126.13],[33.55,126.15],
  ];
  ctx.beginPath();
  jeju.forEach(([la, lo], i) => {
    const [x, y] = geoToCanvas(la, lo, W, H);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fillStyle   = 'rgba(30,58,138,.15)';
  ctx.strokeStyle = 'rgba(59,130,246,.5)';
  ctx.lineWidth   = 1.5;
  ctx.fill();
  ctx.stroke();

  // 제주시 표시
  const [jx, jy] = geoToCanvas(33.4996, 126.5312, W, H);
  ctx.fillStyle = 'rgba(255,255,255,.15)';
  ctx.beginPath(); ctx.arc(jx, jy, 8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.font = '10px Courier New';
  ctx.fillText('제주시', jx+10, jy+4);

  const tick = Date.now();

  // 요원 렌더링
  _agents.forEach(a => {
    const [x, y] = geoToCanvas(a.lat, a.lng, W, H);
    const color = a.status === '대기' ? '#3b82f6' : a.status === '출동중' ? '#22c55e' : '#94a3b8';
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x, y - 7);
    ctx.lineTo(x + 5, y + 4);
    ctx.lineTo(x - 5, y + 4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.6)';
    ctx.font = '9px Courier New';
    ctx.fillText(a.name.slice(0,3), x-8, y+15);
  });

  // 차량 렌더링
  _vehicles.forEach(v => {
    const [x, y] = geoToCanvas(v.lat, v.lng, W, H);
    const color = v.autonomous ? '#d8b4fe' : v.status === '대기' ? '#60a5fa' : '#4ade80';
    ctx.fillStyle = color;
    ctx.fillRect(x-5, y-4, 10, 8);
    if (v.autonomous) {
      ctx.strokeStyle = '#d8b4fe';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x-7, y-6, 14, 12);
    }
  });

  // 사건 렌더링 (깜빡임)
  _mapEntities.filter(e => e.type === 'incident').forEach(e => {
    const [x, y] = geoToCanvas(e.lat || 33.4950, e.lng || 126.5280, W, H);
    const blinkOn = Math.floor(tick / 500) % 2 === 0;
    const color   = e.severity === 'CRITICAL' ? '#ef4444'
                  : e.severity === 'HIGH'     ? '#f97316' : '#eab308';

    if (blinkOn) {
      // 외곽 pulse
      ctx.strokeStyle = color + '44';
      ctx.lineWidth   = 2;
      ctx.beginPath(); ctx.arc(x, y, 18, 0, Math.PI*2); ctx.stroke();
    }

    ctx.fillStyle   = color;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth   = 1.5;
    ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font      = 'bold 9px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('!', x, y+3);
    ctx.textAlign = 'left';

    ctx.fillStyle = 'rgba(255,255,255,.7)';
    ctx.font      = '9px Courier New';
    ctx.fillText(e.id || e.label, x+10, y+3);
  });

  _animFrame = requestAnimationFrame(drawMap);
}

// ── 시뮬레이션 ────────────────────────────────────────────
let _simCounter = 0;

async function simIncident(type, severity) {
  _simCounter++;
  const id = `KP-SIM-${String(_simCounter).padStart(4,'0')}`;
  const lats = [33.4950, 33.5080, 33.4900, 33.5120];
  const lngs = [126.5280, 126.5200, 126.5100, 126.5150];
  const idx  = _simCounter % 4;

  const incident = {
    id, type, severity,
    lat: lats[idx], lng: lngs[idx],
    address: `제주시 시뮬레이션 위치 ${_simCounter}`,
    requiredSpecialties: [],
    requiredVehicles: severity === 'CRITICAL' ? 2 : 1,
  };

  addLog(severity, `[SIM] ${type} 사건 시뮬레이션 시작 — ${id}`);

  const result = await DispatchEngine.dispatch(incident);
  result.lat = incident.lat;
  result.lng = incident.lng;
  receiveDispatch(result);
}

function simAVCommand() {
  const avVehicles = _vehicles.filter(v => v.autonomous);
  if (avVehicles.length === 0) { addLog('INFO', 'AV 차량 없음'); return; }
  const v = avVehicles[0];
  const dest = { lat: 33.4950 + Math.random() * 0.02, lng: 126.52 + Math.random() * 0.02, address: '시뮬레이션 목적지' };
  window.dispatchEvent(new CustomEvent('kpolice_av_command', {
    detail: { vehicleId: v.id, vehicleType: v.type, destination: dest, mission: '용의자 이송', simulated: true, timestamp: new Date().toISOString() }
  }));
  // 차량 이동 시뮬
  const ent = _mapEntities.find(e => e.id === v.id);
  if (ent) { ent.targetLat = dest.lat; ent.targetLng = dest.lng; }
  else _mapEntities.push({ type:'vehicle', id:v.id, lat:v.lat, lng:v.lng, targetLat:dest.lat, targetLng:dest.lng });
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── 초기화 ────────────────────────────────────────────────
(async () => {
  await DispatchEngine.loadResources();
  _agents   = DispatchEngine.getAgents();
  _vehicles = DispatchEngine.getVehicles();

  // 차량을 지도 엔티티로 등록
  _vehicles.forEach(v => _mapEntities.push({type:'vehicle', id:v.id, lat:v.lat, lng:v.lng}));

  updateCounts();
  renderRightContent();
  initBroadcastChannel();
  drawMap(); // 지도 애니메이션 시작

  addLog('INFO', `K-Police OPS Center 초기화 완료 — 요원 ${_agents.length}명, 차량 ${_vehicles.length}대`);
  addLog('INFO', 'BroadcastChannel 수신 대기 중 (kpolice_ops)');
  addLog('AV', `자율주행 차량 ${_vehicles.filter(v=>v.autonomous).length}대 대기 중`);

  // 요원 탭도 초기 로드
  setInterval(() => {
    _agents = DispatchEngine.getAgents();
    _vehicles = DispatchEngine.getVehicles();
    if (_rightTab === 'agents' || _rightTab === 'vehicles') renderRightContent();
  }, 3000);
})();
