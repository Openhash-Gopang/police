<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>K-Police AI 경찰관</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap">
<script src="/gopang-wallet.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/risk-engine.js"></script>
<script src="js/dispatch.js"></script>
<script src="js/lawsuit.js"></script>
<script type="module" src="https://hondi.net/auth/subsystem-auth.js"></script>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;height:100dvh;overflow:hidden;
  font-family:'Pretendard',-apple-system,'Helvetica Neue',sans-serif;
  font-size:15px;background:#fff;color:#111;-webkit-font-smoothing:antialiased}
:root{
  --green:#16a34a;--green-lt:#dcfce7;--green-dk:#15803d;--green-bd:#86efac;
  --border:#e5e7eb;--txt2:#6b7280;--txt3:#9ca3af;
  --chip-bg:#f9fafb;--chip-border:#e5e7eb;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}

/* ── 앱 레이아웃 ── */
.app{display:flex;flex-direction:column;height:100%;height:100dvh;
  max-width:480px;margin:0 auto;background:#fff;overflow:hidden}

/* ── 상단 바 ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-t)+12px) 16px 12px;
  border-bottom:1px solid var(--border);flex-shrink:0;background:#fff;
}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-icon{width:28px;height:28px;background:var(--green);border-radius:7px;
  display:flex;align-items:center;justify-content:center}
.topbar-icon svg{width:14px;height:14px;stroke:#fff;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.topbar-name{font-size:15px;font-weight:800;color:#111;letter-spacing:-.3px}
.topbar-right{display:flex;align-items:center;gap:6px}
.auth-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;
  background:var(--chip-bg);color:var(--txt2);border:1px solid var(--chip-border);display:none}
.top-btn{
  display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;
  font-size:12px;font-weight:600;color:var(--txt2);background:none;border:none;
  cursor:pointer;transition:background .12s,color .12s;
}
.top-btn:hover,.top-btn:active{background:var(--chip-bg);color:#111}
.top-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.top-btn.icon-only{padding:6px;border-radius:8px}
.top-btn.icon-only svg{width:18px;height:18px}

/* ── 설정 패널 ── */
.settings-panel{
  position:fixed;inset:0;z-index:999;display:flex;justify-content:flex-end;
  visibility:hidden;
}
.settings-panel.open{visibility:visible}
.settings-overlay{
  flex:1;background:rgba(0,0,0,.3);
  opacity:0;transition:opacity .25s;cursor:pointer;
}
.settings-panel.open .settings-overlay{opacity:1}
.settings-drawer{
  width:80%;max-width:300px;background:#fff;height:100%;
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .25s;
  box-shadow:-4px 0 24px rgba(0,0,0,.12);
}
.settings-panel.open .settings-drawer{transform:translateX(0)}
.settings-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-t)+14px) 16px 14px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.settings-head-title{font-size:15px;font-weight:800;color:#111}
.settings-close{background:none;border:none;cursor:pointer;padding:4px;
  display:flex;align-items:center;justify-content:center;border-radius:6px}
.settings-close:hover{background:var(--chip-bg)}
.settings-close svg{width:18px;height:18px;stroke:#6b7280;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.settings-body{flex:1;overflow-y:auto;padding:12px 0}
.settings-section{padding:8px 16px 4px}
.settings-section-title{font-size:11px;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.settings-item{
  display:flex;align-items:center;gap:12px;padding:11px 16px;
  cursor:pointer;transition:background .12s;border-radius:0;
}
.settings-item:hover{background:var(--chip-bg)}
.settings-item svg{width:18px;height:18px;stroke:#374151;stroke-width:1.8;fill:none;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.settings-item-label{font-size:14px;font-weight:500;color:#111}
.settings-item-sub{font-size:12px;color:var(--txt2);margin-top:1px}
.settings-sep{height:1px;background:var(--border);margin:4px 16px}

/* ── 채팅 화면 ── */
.chat-screen{display:flex;flex-direction:column;flex:1;overflow:hidden}

/* ── 채팅 바디 ── */
.chat-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 16px 12px;display:flex;flex-direction:column;gap:10px;background:#fff;
}

/* 인트로 */
.intro-section{
  display:flex;flex-direction:column;align-items:center;
  padding:40px 0 28px;gap:16px;
}
.intro-icon{
  width:68px;height:68px;border-radius:20px;background:var(--green);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 28px rgba(22,163,74,.28);
}
.intro-icon svg{width:32px;height:32px;stroke:#fff;stroke-width:1.8;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.intro-title{font-size:20px;font-weight:800;color:#111;letter-spacing:-.4px;text-align:center}
.intro-sub{font-size:14px;color:var(--txt2);line-height:1.65;text-align:center}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 8px}
.chip{
  display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:20px;
  background:#fff;border:1.5px solid var(--chip-border);
  font-size:13px;font-weight:600;color:#374151;cursor:pointer;
  transition:border-color .12s,background .12s,color .12s;white-space:nowrap;
}
.chip svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.chip:hover,.chip:active{background:var(--green-lt);border-color:var(--green);color:var(--green-dk)}

/* 버블 */
.b-ai{
  max-width:88%;align-self:flex-start;
  background:#f9fafb;border:1px solid var(--border);
  border-radius:4px 16px 16px 16px;
  padding:10px 14px;font-size:14px;line-height:1.75;color:#111;
  box-shadow:0 1px 2px rgba(0,0,0,.04);
}
.b-ai b{font-weight:700}
.b-ai code{background:#f1f5f9;padding:1px 5px;border-radius:4px;font-size:13px}
.b-user{
  max-width:88%;align-self:flex-end;
  background:var(--green);color:#fff;
  border-radius:16px 16px 4px 16px;
  padding:10px 14px;font-size:14px;line-height:1.75;
}
.b-time{font-size:10px;color:var(--txt3);margin-top:3px;padding:0 2px}
.b-ai-wrap{display:flex;flex-direction:column;align-self:flex-start;max-width:88%}
.b-user-wrap{display:flex;flex-direction:column;align-items:flex-end;max-width:88%;align-self:flex-end}

/* ── 입력 영역 ── */
.chat-input-area{
  background:#fff;border-top:1px solid var(--border);
  padding:10px 12px calc(10px + var(--safe-b));
  display:flex;align-items:flex-end;flex-shrink:0;gap:6px;
}
.input-wrap{
  flex:1;display:flex;align-items:flex-end;background:#f3f4f6;
  border:1.5px solid transparent;border-radius:22px;
  padding:8px 10px 8px 14px;
  transition:border-color .15s,background .15s;min-width:0;
}
.input-wrap:focus-within{border-color:var(--green);background:#fff}
.chat-textarea{
  flex:1;background:transparent;border:none;
  font-family:'Pretendard',sans-serif;font-size:14px;
  resize:none;outline:none;max-height:120px;line-height:1.5;
  color:#111;padding:2px 0;min-width:0;
}
.chat-textarea::placeholder{color:var(--txt3)}

/* 입력 필드 옆 전송 버튼 (항상 표시) */
.chat-send-btn{
  width:34px;height:34px;border-radius:50%;background:var(--green);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;border:none;cursor:pointer;transition:background .12s;align-self:flex-end;
}
.chat-send-btn:disabled{background:var(--green-bd);cursor:not-allowed}
.chat-send-btn svg{width:14px;height:14px;stroke:#fff;stroke-width:2.2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}

/* 보조 버튼 그룹 — 기본 표시, 입력 중 숨김 */
.aux-btns{
  display:flex;align-items:center;gap:2px;flex-shrink:0;align-self:flex-end;
  transition:opacity .15s,width .15s;overflow:hidden;
}
.aux-btns.hidden{opacity:0;width:0;pointer-events:none}
.aux-btn{
  width:40px;height:40px;border-radius:50%;background:none;border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .12s;flex-shrink:0;
}
.aux-btn:hover,.aux-btn:active{background:var(--chip-bg)}
.aux-btn svg{width:22px;height:22px;stroke:#6b7280;stroke-width:1.8;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.aux-btn.mic-btn svg{stroke:var(--green);width:24px;height:24px;stroke-width:2}

/* ── 토스트 ── */
.toast{
  position:fixed;bottom:calc(80px + var(--safe-b));left:50%;
  transform:translateX(-50%) translateY(10px);
  background:#111;color:#fff;border-radius:10px;
  padding:10px 18px;font-size:13px;font-weight:500;
  z-index:9999;opacity:0;transition:all .25s;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 대화 기록 모달 ── */
.history-modal{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.45);
  display:flex;align-items:flex-end;justify-content:center;
  visibility:hidden;opacity:0;transition:opacity .2s,visibility .2s;
}
.history-modal.open{visibility:visible;opacity:1}
.history-sheet{
  width:100%;max-width:480px;background:#fff;
  border-radius:20px 20px 0 0;
  max-height:75dvh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .25s;
}
.history-modal.open .history-sheet{transform:translateY(0)}
.history-sheet-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.history-sheet-title{font-size:15px;font-weight:800;color:#111}
.history-sheet-close{background:none;border:none;cursor:pointer;padding:4px;
  border-radius:6px;display:flex;align-items:center;justify-content:center}
.history-sheet-close:hover{background:var(--chip-bg)}
.history-sheet-close svg{width:18px;height:18px;stroke:#6b7280;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.history-body{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.history-empty{text-align:center;color:var(--txt3);font-size:14px;padding:32px 0}
.history-item{border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.6}
.history-item.user{background:var(--green-lt);color:var(--green-dk);align-self:flex-end;max-width:88%;text-align:right}
.history-item.ai{background:var(--chip-bg);color:#374151;align-self:flex-start;max-width:88%}
.history-item-role{font-size:10px;font-weight:700;margin-bottom:3px;opacity:.7}


/* ── K-Police 전용 ── */
:root {
  --red:#dc2626;--orange:#ea580c;--blue:#1d4ed8;
  --surface:#fff;--red-bg:#fef2f2;--orange-bg:#fff7ed;
}
.danger-banner{display:none;padding:8px 16px;font-size:13px;font-weight:700;
  text-align:center;flex-shrink:0;animation:pulseBg 1.5s ease-in-out infinite}
.danger-banner.critical{display:block;background:var(--red);color:#fff}
.danger-banner.high{display:block;background:var(--orange);color:#fff}
.incident-card{background:var(--surface);border-radius:14px;padding:14px;
  margin:4px 0;align-self:stretch;box-shadow:0 2px 8px rgba(29,78,216,.08);
  border:1px solid var(--sep)}
.incident-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.badge-critical{background:#fef2f2;color:var(--red)}
.badge-high{background:#fff7ed;color:var(--orange)}
.dispatch-card{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:14px;
  padding:14px;margin:4px 0;align-self:stretch}
.btn-gopang{flex:1;padding:10px;background:var(--blue);color:#fff;
  border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.btn-112{flex:1;padding:8px;background:var(--red);color:#fff;border:none;
  border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.5px}
.btn-118{flex:1;padding:8px;background:var(--orange);color:#fff;border:none;
  border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.location-bar{display:flex;align-items:center;gap:6px;padding:4px 16px;
  background:rgba(29,78,216,.06);flex-shrink:0;font-size:11px;color:var(--txt2)}
#auth-modal{display:none;position:fixed;inset:0;z-index:9000;
  background:rgba(0,0,0,.4);align-items:flex-end;justify-content:center}
#auth-modal.open{display:flex}
.danger-banner{display:none;padding:8px 16px;font-size:13px;font-weight:700;
  text-align:center;flex-shrink:0;letter-spacing:.3px}
.danger-banner.critical{display:block;background:var(--red);color:#fff}
.danger-banner.high{display:block;background:var(--orange);color:#fff}
.location-bar{display:flex;align-items:center;gap:6px;padding:4px 16px 0;
  font-size:11px;color:#6b7280;flex-shrink:0}
.location-bar svg{width:11px;height:11px;stroke:currentColor;stroke-width:2;fill:none}
.incident-card{background:var(--surface);border-radius:14px;padding:14px;
  margin:4px 0;align-self:flex-start;max-width:90%;border:1px solid var(--border);
  box-shadow:0 1px 4px rgba(0,0,0,.06)}
.dispatch-card{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:14px;
  padding:14px;margin:4px 0;align-self:flex-start;max-width:90%}
.incident-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.badge-critical{background:#fef2f2;color:var(--red);padding:3px 8px;border-radius:6px;font-size:12px;font-weight:700}
.badge-high{background:#fff7ed;color:var(--orange);padding:3px 8px;border-radius:6px;font-size:12px;font-weight:700}
.badge-medium{background:#fefce8;color:#ca8a04;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:700}
.badge-low{background:#f0fdf4;color:#16a34a;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:700}
.btn-gopang{flex:1;padding:10px;background:var(--blue);color:#fff;
  border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.suggest-bar{background:#f0fdf4;border-top:1px solid var(--border);
  padding:8px 12px;display:none;flex-shrink:0}
</style>
</head>
<body>
<div class="app">
  <!-- 위험도 배너 -->
  <div class="danger-banner" id="danger-banner"></div>

  <!-- 상단 바 -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
      </div>
      <span class="topbar-name">K-Police</span>
    </div>
    <div class="topbar-right">
      <span class="auth-badge" id="auth-badge">L0</span>
      <button class="top-btn" onclick="call112()" style="color:#dc2626;border-color:#fca5a5;background:#fef2f2">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.83 19a19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        112
      </button>
      <button class="top-btn icon-only" onclick="openSettings()" title="설정">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>

  <!-- 위치 바 -->
  <div class="location-bar" id="location-bar" style="display:none">
    <svg viewBox="0 0 24 24"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
    <span id="location-text">위치 확인 중…</span>
  </div>

  <!-- 채팅 화면 -->
  <div class="chat-screen">
    <div class="chat-body" id="mob-chat-body">
      <!-- 인트로 -->
      <div class="intro-section" id="intro-section">
        <div class="intro-icon">
          <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
        </div>
        <div>
          <div class="intro-title">K-Police AI 경찰관</div>
          <div class="intro-sub" style="margin-top:6px">범죄 신고 · 야간 귀가 · 보이스피싱 · 사이버범죄<br>24시간 보디가드입니다.</div>
        </div>
        <div class="chip-row">
          <button class="chip" onclick="qs('지금 위험한 상황입니다!')">
            <svg viewBox="0 0 24 24"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            긴급 신고
          </button>
          <button class="chip" onclick="qs('범죄를 신고하겠습니다.')">
            <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            범죄 신고
          </button>
          <button class="chip" onclick="qs('오늘 밤 혼자 귀가합니다. 안전한지 확인해 주세요.')">
            <svg viewBox="0 0 24 24"><path d="M17.5 21H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/></svg>
            야간 귀가
          </button>
          <button class="chip" onclick="qs('보이스피싱 전화를 받았습니다.')">
            <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 4.15 12 19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            보이스피싱

<script>
// ── 상태 변수 ─────────────────────────────────────────────────
let _user = null;
let _currentMode = 'normal';
let _currentRisk = 'LOW';
let _activeCaseNum = null;
let _sessionStart = new Date();
let _sessionMsgCnt = 0;
let _userLocation = null;
let _systemPrompt = null;

// ── 설정 ──────────────────────────────────────────────────────


// ── SP 동적 로드 ───────────────────────────────────────────────
const PROXY = 'https://gopang-proxy.tensor-city.workers.dev';
async function loadSystemPrompt() {
  if (_systemPrompt) return _systemPrompt;
  try { _systemPrompt = await (await fetch('/prompts/system_prompt.txt')).text(); }
  catch { _systemPrompt = `당신은 K-Police AI 경찰관입니다. 24시간 보디가드로서 시민을 보호합니다.
CRITICAL이면 즉시 112 전화를 안내하세요. 범죄 신고 시 6하원칙으로 정보를 수집하세요.`; }
  return _systemPrompt;
}

// ── AI 호출 ───────────────────────────────────────────────────
async function callAI(userMsg) {
  const sysPrompt = await loadSystemPrompt();

  // 현재 모드·위치·사건번호 컨텍스트 주입
  const ctx = [
    `[모드: ${_currentMode}]`,
    _userLocation ? `[사용자 위치: ${_userLocation.lat.toFixed(4)}, ${_userLocation.lng.toFixed(4)}]` : '',
    _activeCaseNum ? `[진행 중인 사건번호: ${_activeCaseNum}]` : '',
    _reportStep > 0 ? `[신고 진행 단계: ${_reportStep}/6]` : '',
    `[현재 시각: ${new Date().toLocaleTimeString('ko-KR')}]`,
  ].filter(Boolean).join(' ');

  _chatHistory.push({ role:'user', content:`${ctx}\n${userMsg}` });

  const res = await fetch(`${KPOLICE_CONFIG.proxyUrl}/deepseek`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:       KPOLICE_CONFIG.model,
      max_tokens:  KPOLICE_CONFIG.maxTokens,
      temperature: KPOLICE_CONFIG.temperature,
      messages:[{role:'system',content:sysPrompt},..._chatHistory],
    }),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data  = await res.json();
  const reply = data.choices?.[0]?.message?.content || '(응답 없음)';
  _chatHistory.push({role:'assistant',content:reply});
  return reply;
}

// ── UI 헬퍼 ───────────────────────────────────────────────────
function fmtTime(d) {
  return d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:true});
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function mdToHtml(s) {
  return s
    .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
    .replace(/\*(.*?)\*/g,'<i>$1</i>')
    .replace(/`(.*?)`/g,'<code style="background:#f3f4f6;padding:1px 5px;border-radius:4px;font-size:13px">$1</code>')
    .replace(/\n/g,'<br>');
}
function mdToHtml(s) {
  return s
    .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
    .replace(/\*(.*?)\*/g,'<i>$1</i>')
    .replace(/`(.*?)`/g,'<code style="background:#f3f4f6;padding:1px 5px;border-radius:4px;font-size:13px">$1</code>')
    .replace(/\n/g,'<br>');
}
function scrollBottom() {
  const b = document.getElementById('chat-body');
  setTimeout(() => b.scrollTop = b.scrollHeight, 50);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function updateSendBtn() {
  const btn = document.getElementById('mob-send-btn');
  if (btn) btn.disabled = !document.getElementById('mob-input').value.trim();
}
function onInputChange(el) {
  autoResize(el); updateSendBtn();
  const typing = el.value.length > 0;
  document.getElementById('aux-btns')?.classList.toggle('hidden', typing);
  const intro = document.getElementById('intro-section');
  if (intro) intro.style.display = typing ? 'none' : 'flex';
}
function hideIntro() {
  const el = document.getElementById('intro-section');
  if (el) el.style.display = 'none';
}
function toast(msg) {
  const t = document.getElementById('mob-toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── 버블 추가 (원본 함수 보존) ───────────────────────────────
function appendAI(text, risk = 'LOW', extraClass = '') {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-ai';
  const cls = risk==='CRITICAL'?'critical-msg':risk==='HIGH'?'high-msg':extraClass?extraClass:'';
  wrap.innerHTML = `
    <div class="ai-avatar">👮</div>
    <div class="bubble-ai-text ${cls}">${mdToHtml(text)}</div>`;
  document.getElementById('chat-body').appendChild(wrap);
  const t = document.createElement('div');
  t.className = 'bubble-ai-time';
  t.textContent = fmtTime(new Date());
  document.getElementById('chat-body').appendChild(t);
  scrollBottom();
}
function appendUser(text) {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-user';
  wrap.innerHTML = `
    <div class="bubble-user-text">${escHtml(text)}</div>
    <div class="bubble-user-time">${fmtTime(new Date())}</div>`;
  document.getElementById('chat-body').appendChild(wrap);
  scrollBottom();
}
function showTyping() {
  const el = document.createElement('div');
  el.className = 'typing'; el.id = 'typing-indicator';
  el.innerHTML = `<div class="ai-avatar">👮</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>`;
  document.getElementById('chat-body').appendChild(el);
  scrollBottom();
}
function removeTyping() { document.getElementById('typing-indicator')?.remove(); }

// ── 위험 배너 업데이트 ─────────────────────────────────────
function updateDangerBanner(risk) {
  const el = document.getElementById('danger-banner');
  el.className = 'danger-banner';
  if (risk==='CRITICAL'){ el.classList.add('critical'); el.textContent='🚨 CRITICAL — 즉시 112에 전화하세요'; }
  else if (risk==='HIGH'){ el.classList.add('high'); el.textContent='⚠️ HIGH — 빠른 신고가 필요합니다'; }
}
function appendIncidentCard(caseNum, crimeInfo, incident) {
  const el = document.createElement('div');
  el.className = 'incident-card';
  const badgeClass = crimeInfo.severity === 'CRITICAL' ? 'badge-critical' : 'badge-high';
  el.innerHTML = `
    <div class="incident-card-header">
      <div class="incident-number">📁 ${caseNum}</div>
      <span class="incident-badge ${badgeClass}">${crimeInfo.severity}</span>
    </div>
    <div class="incident-row"><span class="key">범죄 유형</span><span class="val">${crimeInfo.type}</span></div>
    <div class="incident-row"><span class="key">적용 법조</span><span class="val">${crimeInfo.article || '수사 중'}</span></div>
    <div class="incident-row"><span class="key">접수 시각</span><span class="val">${fmtTime(new Date())}</span></div>
    <div class="incident-row"><span class="key">소송 유형</span><span class="val">형사 (국가 vs 피의자)</span></div>`;
  document.getElementById('chat-body').appendChild(el);
  scrollBottom();
}
function appendDispatchCard(dispatchResult) {
  const el = document.createElement('div');
  el.className = 'dispatch-card';
  const orders = dispatchResult.dispatchOrders || [];
  el.innerHTML = `
    <div class="dispatch-title">🚔 출동 지시 완료 — ${orders.length}명 출동</div>
    ${orders.map(o => `
    <div class="dispatch-agent">
      <div class="agent-avatar">${o.rank.charAt(0)}</div>
      <div class="agent-info">
        <div class="agent-name">${o.agentName} ${o.rank} — ${o.role}</div>
        <div class="agent-role">${o.action.slice(0,40)}…</div>
      </div>
      <div class="agent-eta">~${o.eta}분</div>
    </div>`).join('')}
    ${dispatchResult.vehicleOrders?.some(v => v.autonomous) ? `
    <div style="margin-top:8px;padding:6px 8px;background:#e0f2fe;border-radius:8px;font-size:12px;color:#0369a1">
      🤖 자율주행 차량 ${dispatchResult.vehicleOrders.filter(v=>v.autonomous).length}대 자동 출동 명령 전송됨
    </div>` : ''}`;
  document.getElementById('chat-body').appendChild(el);
  scrollBottom();
}

// ── 위험도 배너 ───────────────────────────────────────────────
function updateDangerBanner(risk) {
  const el = document.getElementById('danger-banner');
  el.className = 'danger-banner';
  if (risk==='CRITICAL'){ el.classList.add('critical'); el.textContent='🚨 CRITICAL — 즉시 112에 전화하세요'; }
  else if (risk==='HIGH'){ el.classList.add('high'); el.textContent='⚠️ HIGH — 빠른 신고가 필요합니다'; }
}
function hideBanner() { document.getElementById('complete-banner').classList.remove('show'); }

// ── PDV 표준 payload { user_guid, source, report: { pdv_6w } } ─
async function sendPDVReport() {
  const user_guid = _user?.ipv6 || _user?.guid || 'anonymous';
  const mins = Math.round((new Date() - _sessionStart) / 60000);
  try {
    const res = await fetch(`${KPOLICE_CONFIG.proxyUrl}/pdv_log`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        user_guid,
        source: 'kpolice',
        report: {
          pdv_6w: {
            who:   user_guid,
            when:  new Date().toISOString(),
            where: location.href,
            what:  `K-Police 상담 완료 — ${mins}분 / ${_sessionMsgCnt}회`,
            how:   `AI 경찰관 채팅 / 위험도: ${_currentRisk}${_activeCaseNum ? ' / 사건번호: '+_activeCaseNum : ''}`,
            why:   '범죄 예방 및 피해 대응',
          },
        },
      }),
    });
    return (await res.json())?.pdv_entry || 'recorded';
  } catch { return null; }
}

// ── 메시지 전송 ───────────────────────────────────────────────
async function sendMessage(text) {
  if (!text.trim()) return;
  document.getElementById('quick-chips').style.display = 'none';
  appendUser(text);
  _sessionMsgCnt++;
  const inp = document.getElementById('msg-input');
  inp.value = '';
  autoResize(inp);
  updateSendBtn();

  // 위험 분석
  const { level } = RiskEngine.analyzeContext({
    text, hour: new Date().getHours(),
  });
  if (['HIGH','CRITICAL'].includes(level)) {
    _currentRisk = level;
    updateDangerBanner(level);
  }

  // 신고 모드 전처리
  if (_currentMode === 'report') {
    await handleReportMode(text);
  }

  showTyping();
  try {
    const reply = await callAI(text);
    removeTyping();
    appendAI(reply, _currentRisk);
    if (_sessionMsgCnt > 0 && _sessionMsgCnt % 8 === 0) suggestComplete();
  } catch(e) {
    removeTyping();
    appendAI('⚠️ 오류가 발생했습니다. 다시 시도해 주세요.\n(' + e.message + ')', 'LOW');
  }
  document.getElementById('send-btn').disabled = false;
}
async function handleReportMode(text) {
  // 범죄 유형 분류
  const crimeInfo = RiskEngine.classifyCrime(text);

  if (crimeInfo.isCriminal && !_activeCaseNum) {
    // 사건번호 발급
    _activeCaseNum   = RiskEngine.generateCaseNumber();
    _activeCrimeInfo = crimeInfo;

    // 사건 카드 표시
    appendIncidentCard(_activeCaseNum, crimeInfo, {});
    appendAI(`사건번호 **${_activeCaseNum}**이 발급됐습니다.\n\n이 사건은 **형사 사건**으로 분류됩니다.\n📌 적용 법조: ${crimeInfo.article}\n\n지금 안전한 곳에 계십니까?`, crimeInfo.severity);

    // CRITICAL/HIGH → 즉시 출동
    if (['CRITICAL','HIGH'].includes(crimeInfo.severity) && _userLocation) {
      const incident = {
        id:       _activeCaseNum,
        type:     crimeInfo.type,
        severity: crimeInfo.severity,
        lat:      _userLocation.lat,
        lng:      _userLocation.lng,
        address:  `사용자 위치 (${_userLocation.lat.toFixed(4)}, ${_userLocation.lng.toFixed(4)})`,
        requiredSpecialties: [],
        requiredVehicles: 1,
      };

      try {
        const dispatchResult = await DispatchEngine.dispatch(incident);
        appendDispatchCard(dispatchResult);
        appendAI(`출동 지시가 완료됐습니다. 가장 가까운 경찰관이 약 **${dispatchResult.dispatchOrders[0]?.eta || '?'}분** 후 도착합니다.\n\n계속해서 상황을 알려주세요.`, crimeInfo.severity);
      } catch(e) {
        console.warn('[Dispatch]', e.message);
      }
    }

    _reportStep = 1;
    return; // AI 일반 호출 스킵
  }

  // 형사 사건 소송 패키지 요청
  if (_activeCaseNum && text.includes('소송') || text.includes('고소') || text.includes('기소')) {
    appendAI('소송 패키지를 생성하고 있습니다…', 'LOW', 'system-msg');
    try {
      const { html } = await LawsuitEngine.create({
        caseNumber: _activeCaseNum,
        crimeInfo:  _activeCrimeInfo,
        chatHistory: _chatHistory,
        victimInfo: { name: _user?.name || '피해자', ipv6: _user?.ipv6 },
      });
      const el = document.createElement('div');
      el.innerHTML = html;
      document.getElementById('chat-body').appendChild(el);
      scrollBottom();
    } catch(e) {
      appendAI('소송 패키지 생성 중 오류가 발생했습니다. 다시 시도해 주세요.', 'LOW');
    }
    return;
  }
}
function suggestComplete() {

    document.getElementById('location-text').textContent =
      `위치 확인됨 — ${_userLocation.lat.toFixed(4)}, ${_userLocation.lng.toFixed(4)}`;
    analyzeLocationRisk(_userLocation);
  };
  navigator.geolocation.getCurrentPosition(update, () => {
    // 폴백: 제주 기본 위치
    _userLocation = { lat: 33.4996, lng: 126.5312 };
    document.getElementById('location-text').textContent = '위치: 제주 (기본값)';
  });
  setInterval(() => navigator.geolocation.getCurrentPosition(update), KPOLICE_CONFIG.locationInterval);

function analyzeLocationRisk(loc) {

// ── PDV & 종료 ────────────────────────────────────────────────
async function sendPDVReport() {
  const user_guid = _user?.ipv6 || _user?.guid || 'anonymous';
  const mins = Math.round((new Date() - _sessionStart) / 60000);
  try {
    const res = await fetch(`${KPOLICE_CONFIG.proxyUrl}/pdv_log`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        user_guid,
        source: 'kpolice',
        report: {
          pdv_6w: {
            who:   user_guid,
            when:  new Date().toISOString(),
            where: location.href,
            what:  `K-Police 상담 완료 — ${mins}분 / ${_sessionMsgCnt}회`,
            how:   `AI 경찰관 채팅 / 위험도: ${_currentRisk}${_activeCaseNum ? ' / 사건번호: '+_activeCaseNum : ''}`,
            why:   '범죄 예방 및 피해 대응',
          },
        },
      }),
    });
    return (await res.json())?.pdv_entry || 'recorded';
  } catch { return null; }
}
async function finishAndReturn() {
  const btn = document.querySelector('.btn-gopang');
  btn.textContent = '기록 중…'; btn.disabled = true;
  const pdvId = await sendPDVReport();
  appendAI('상담 기록이 고팡 PDV에 저장됐습니다. ✅\n안전하게 지내세요! 👮', 'LOW');
  hideBanner();
  if (_isGwp && window.parent !== window) {
    window.parent.postMessage({ type:'GWP_SESSION_COMPLETE', svc:'police', pdv_id:pdvId, risk_level:_currentRisk }, _gwpOrigin);
  }
  setTimeout(() => {
    if (_isGwp && window.parent !== window) window.parent.postMessage({type:'GWP_CLOSE',svc:'police'}, _gwpOrigin);
    else window.location.href = KPOLICE_CONFIG.gopangUrl;
  }, 1500);
}

})();


// ── 마이크 v3.6 ───────────────────────────────────────────────
let micActive = false, recognition = null, mediaRecorder = null, audioChunks = [];
function _micSetUI(active) {
  micActive = active;
  const btn = document.getElementById('mob-mic-btn');
  if (!btn) return;
  if (active) { btn.style.background = '#fee2e2'; btn.querySelector('svg').style.stroke = '#ef4444'; }
  else { btn.style.background = ''; btn.querySelector('svg').style.stroke = ''; }
}
function _micStartWebSpeech(SR) {
  recognition = new SR();
  recognition.lang           = 'ko-KR';
  recognition.continuous     = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = (e) => {
    const t = e.results[0][0].transcript;
    const inp = document.getElementById('msg-input');
    if (inp && t) {
      inp.value = t;
      autoResize(inp);   // ★ 직접 호출
      updateSendBtn();   // ★ 직접 호출
    }
    _micSetUI(false);
    setTimeout(() => { if (inp?.value.trim()) sendMessage(inp.value.trim()); }, 100);
  };

  recognition.onerror = (e) => {
    _micSetUI(false);
    console.warn('[Mic] 오류:', e.error);
    if (e.error !== 'aborted') appendAI('🎤 음성 인식 오류: ' + e.error, 'LOW');
  };

  recognition.onend = () => { _micSetUI(false); };

  recognition.start();
  _micSetUI(true);
}
async function _micStartMediaRecorder() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      _micSetUI(false);
    };
    mediaRecorder.start();
    _micSetUI(true);
  } catch(e) {
    _micSetUI(false);
    appendAI('🎤 마이크 권한이 필요합니다.', 'LOW');
  }
}
function toggleMic() {
  if (micActive) {
    if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    _micSetUI(false);
    return;
  }
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!isIOS && SR) {
    _micStartWebSpeech(SR);
  } else if (isIOS && window.MediaRecorder) {
    _micStartMediaRecorder();
  } else {
    appendAI('🎤 이 브라우저에서는 음성 인식을 지원하지 않습니다.', 'LOW');
  }
}
